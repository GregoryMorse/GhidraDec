name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ida_versions:
        description: "IDA SDK versions to publish: 9.3, latest, 7.3,8.5, or all"
        type: string
        default: "9.3"
      include_private_sdks:
        description: "Include encrypted/private SDK targets"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: matrix
        shell: bash
        run: |
          args=()
          versions="${{ github.event.inputs.ida_versions }}"
          if [[ -z "$versions" ]]; then
            versions="9.3"
          fi
          if [[ "$versions" == "all" ]]; then
            args+=(--all)
          else
            args+=(--versions "$versions")
          fi
          if [[ "${{ github.event.inputs.include_private_sdks }}" != "false" ]]; then
            args+=(--include-private)
          fi
          echo "matrix=$(python tools/ida_sdk.py matrix "${args[@]}")" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    if: ${{ fromJson(needs.matrix.outputs.matrix).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt private SDK archives
        if: ${{ matrix.sdk_source != 'public-release' && matrix.sdk_source != 'public-branch' }}
        shell: bash
        env:
          IDA_SDK_AES_KEY: ${{ secrets.IDA_SDK_AES_KEY }}
        run: |
          if [[ -z "$IDA_SDK_AES_KEY" ]]; then
            echo "IDA_SDK_AES_KEY is required for private SDK release targets." >&2
            exit 1
          fi
          python tools/ida_sdk.py decrypt-private

      - name: Prepare IDA SDK
        shell: bash
        run: python tools/ida_sdk.py ensure --version "${{ matrix.ida }}"

      - name: Prepare Ghidra decompiler sources
        shell: bash
        run: python tools/deps.py ensure-ghidra-sources

      - name: Configure
        shell: bash
        run: cmake -S . -B "build/ida-${{ matrix.ida }}" -DGHIDRADEC_IDA_VERSION="${{ matrix.ida }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build package
        shell: bash
        run: |
          cmake --build "build/ida-${{ matrix.ida }}" --config Release --parallel
          cmake --build "build/ida-${{ matrix.ida }}" --config Release --target package_plugins

      - uses: actions/upload-artifact@v4
        with:
          name: ghidradec-ida${{ matrix.ida }}-${{ matrix.os }}
          path: build/ida-${{ matrix.ida }}/artifacts/*.zip
          if-no-files-found: error

  publish:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - id: missing-assets
        name: Keep only missing release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p upload
          existing="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name' 2>/dev/null || true)"
          shopt -s nullglob
          for file in dist/*.zip; do
            name="$(basename "$file")"
            if grep -Fxq "$name" <<< "$existing"; then
              echo "Skipping existing release asset: $name"
            else
              cp "$file" upload/
            fi
          done
          if compgen -G "upload/*.zip" > /dev/null; then
            echo "has_uploads=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_uploads=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        if: ${{ steps.missing-assets.outputs.has_uploads == 'true' }}
        with:
          files: upload/*.zip
          draft: false
          make_latest: false
          overwrite_files: false
